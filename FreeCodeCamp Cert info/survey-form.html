<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Developer Survey</title>
</head>
<body>

  <h1 id="title">Developer Survey</h1>

  <p id="description">
    Share your experience with us! Your feedback helps shape a better developer community.
    This takes about 2 minutes to complete.
  </p>

  <form id="survey-form">

    <!-- Name -->
    <label id="name-label" for="name">Full Name (required)</label><br />
    <input
      type="text"
      id="name"
      name="name"
      placeholder="e.g. Jane Doe"
      required
    /><br /><br />

    <!-- Email -->
    <label id="email-label" for="email">Email Address (required)</label><br />
    <input
      type="email"
      id="email"
      name="email"
      placeholder="e.g. jane@example.com"
      required
    /><br /><br />

    <!-- Number -->
    <label id="number-label" for="number">Years of Coding Experience</label><br />
    <input
      type="number"
      id="number"
      name="number"
      placeholder="e.g. 3"
      min="0"
      max="60"
    /><br /><br />

    <!-- Dropdown -->
    <label for="dropdown">Current Role</label><br />
    <select id="dropdown" name="role">
      <option value="" disabled selected>Select your role...</option>
      <option value="student">Student</option>
      <option value="junior">Junior Developer</option>
      <option value="mid">Mid-level Developer</option>
      <option value="senior">Senior Developer</option>
      <option value="other">Other</option>
    </select><br /><br />

    <!-- Radio Buttons -->
    <fieldset>
      <legend>Preferred Work Style</legend>
      <input type="radio" id="remote" name="work-style" value="remote" />
      <label for="remote">Remote</label><br />
      <input type="radio" id="hybrid" name="work-style" value="hybrid" />
      <label for="hybrid">Hybrid</label><br />
      <input type="radio" id="onsite" name="work-style" value="onsite" />
      <label for="onsite">On-site</label>
    </fieldset><br />

    <!-- Checkboxes -->
    <fieldset>
      <legend>Topics You Enjoy (select all that apply)</legend>
      <input type="checkbox" id="frontend" name="topics" value="frontend" />
      <label for="frontend">Frontend Development</label><br />
      <input type="checkbox" id="backend" name="topics" value="backend" />
      <label for="backend">Backend Development</label><br />
      <input type="checkbox" id="devops" name="topics" value="devops" />
      <label for="devops">DevOps &amp; Cloud</label><br />
      <input type="checkbox" id="security" name="topics" value="security" />
      <label for="security">Cybersecurity</label><br />
      <input type="checkbox" id="ai" name="topics" value="ai" />
      <label for="ai">AI &amp; Machine Learning</label>
    </fieldset><br />

    <!-- Textarea -->
    <label for="comments">Additional Comments</label><br />
    <textarea
      id="comments"
      name="comments"
      rows="5"
      cols="40"
      placeholder="Any thoughts, suggestions, or feedback you'd like to share..."
    ></textarea><br /><br />

    <!-- Submit -->
    <button type="submit" id="submit">Submit Survey</button>

  </form>

</body>
</html>
